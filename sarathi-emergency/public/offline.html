<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SARATHI Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #020617, #111827);
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .card {
        max-width: 460px;
        margin: 24px;
        padding: 24px;
        border: 1px solid rgba(248, 250, 252, 0.15);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.65);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>SARATHI will reconnect automatically when your network is back.</p>
    </div>
  </body>
</html>
